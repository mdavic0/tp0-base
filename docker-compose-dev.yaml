name: tp0
services:
  server:
    container_name: server
    image: server:latest
    entrypoint: python3 /main.py
    environment:
    - PYTHONUNBUFFERED=1
    - LOGGING_LEVEL=DEBUG
    volumes:
    - ./server/config.ini:/config/config.ini
    networks:
    - testing_net
  client1:
    container_name: client1
    image: client:latest
    entrypoint: /client
    environment:
    - CLI_ID=1
    - CLI_LOG_LEVEL=DEBUG
    - CLI_NOMBRE=Santiago Lionel
    - CLI_APELLIDO=Lorca
    - CLI_DOCUMENTO=30904465
    - CLI_NACIMIENTO=1999-03-17
    - CLI_NUMERO=7574
    volumes:
    - ./client/config.yaml:/config/config.yaml
    networks:
    - testing_net
    depends_on:
    - server
  client2:
    container_name: client2
    image: client:latest
    entrypoint: /client
    environment:
    - CLI_ID=2
    - CLI_LOG_LEVEL=DEBUG
    - CLI_NOMBRE=Carolina Maria
    - CLI_APELLIDO=Fernandez
    - CLI_DOCUMENTO=30807654
    - CLI_NACIMIENTO=1990-08-12
    - CLI_NUMERO=4678
    volumes:
    - ./client/config.yaml:/config/config.yaml
    networks:
    - testing_net
    depends_on:
    - server
  client3:
    container_name: client3
