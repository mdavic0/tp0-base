    - CLI_NACIMIENTO=1985-05-22
    - CLI_NUMERO=1234
    volumes:
    - ./client/config.yaml:/config/config.yaml
    networks:
    - testing_net
    depends_on:
    - server
  client4:
    container_name: client4
    image: client:latest
    entrypoint: /client
    environment:
    - CLI_ID=4
    - CLI_LOG_LEVEL=DEBUG
    - CLI_NOMBRE=Maria Jose
    - CLI_APELLIDO=Lopez
